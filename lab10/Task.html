<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Формы</title>
	</head>
	<body>
		<center>Форма регистрации</center>
		<form>
			<p>
			Имя
				<input name="name">
			</p>
			<p>
			e-mail
				<input name="mail">
			</p>
			<p>
			Пароль
				<input type="password" name="pass size="20">
			</p>
			<p>
			Повтор пароля
				<input type="password" name="pass size="20">

			<option value ="animals">животные
			<option value ="cars">автомобили

			</select>
			<p>
			Ваши пожелания
			<textarea <input type="text">
				</textarea>
				</p>
				<p><input type="submit" value="Отправить"><input type="submit" value="Очистить"></p>
		</form>
	</body>
</html>
